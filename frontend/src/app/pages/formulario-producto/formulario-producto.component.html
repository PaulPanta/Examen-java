<div class="container">
  <h1>{{ editandoId !== null ? 'Editar Producto' : 'Nuevo Producto' }}</h1>

  <form [formGroup]="form" (ngSubmit)="guardar()" class="form-grid">
    <label>
      Nombre
      <input type="text" formControlName="nombre" />
      @if (campoInvalido('nombre')) {
        <div class="error">Nombre requerido (mínimo 2 caracteres).</div>
      }
    </label>

    <label>
      Categoría
      <input type="text" formControlName="categoria" />
      @if (campoInvalido('categoria')) {
        <div class="error">Categoría requerida (mínimo 2 caracteres).</div>
      }
    </label>

    <label>
      Precio
      <input type="number" formControlName="precio" />
      @if (campoInvalido('precio')) {
        <div class="error">Precio inválido (mínimo 0).</div>
      }
    </label>

    <label>
      Stock
      <input type="number" formControlName="stock" />
      @if (campoInvalido('stock')) {
        <div class="error">Stock inválido (mínimo 0).</div>
      }
    </label>

    <label>
      <input type="checkbox" formControlName="activo" /> Activo
    </label>

    <div class="actions">
      <button type="submit">Guardar</button>
      <button type="button" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</div>
