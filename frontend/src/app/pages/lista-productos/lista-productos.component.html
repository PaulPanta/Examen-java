<div class="container">
  <h1>Gestión de Productos</h1>

  <button type="button" (click)="irANuevo()">Nuevo Producto</button>

  <table class="table" style="margin-top: 1rem;">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Categoría</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (producto of productos(); track producto.id) {
        <tr>
          <td>{{ producto.id }}</td>
          <td>{{ producto.nombre }}</td>
          <td>{{ producto.categoria }}</td>
          <td>{{ producto.precio }}</td>
          <td>{{ producto.stock }}</td>
          <td>{{ producto.activo ? 'Sí' : 'No' }}</td>
          <td>
            <div class="actions">
              <button type="button" (click)="editar(producto.id)">Editar</button>
              <button type="button" (click)="eliminar(producto.id)">Eliminar</button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
